<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription - Photo</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container register-photo-page">
    <img src="assets/images/logo.png" alt="Logo Fashion Chic" class="logo"/>

    <h1 class="title">Inscription</h1>
    <p class="subtitle">Importer votre photo</p>

    <div class="photo-options">
      <div class="option">
        <img src="assets/images/photo_placeholder.png" alt="Caméra" class="photo-icon">
        <p>Prendre photo<br>avec caméra</p>
      </div>

      <div class="option">
        <img src="assets/images/photo_placeholder.png" alt="Téléphone" class="photo-icon">
        <p>Importer une photo<br>depuis votre téléphone</p>
      </div>
    </div>

    <div class="photo-buttons">
      <a href="register_success.html" class="btn primary">Télécharger</a>
      <a href="register_success.html" class="btn secondary">Passer</a>
    </div>

    <p class="help">
      Besoin d'aide ? <a href="#">Consultez notre centre d'aide</a>
    </p>
  </div>

  <script src="assets/js/script.js"></script>

</body>
</html>
