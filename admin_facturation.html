<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facturation - VDRM</title>
 <link rel="stylesheet" href="assets/css/style.css">


</head>
<body>
  <div class="container admin_facturation_page">
    <header class="header">
  <a href="login.html" class="logout-btn">Déconnexion</a>
</header>

    <h1 class="title">Mon panier</h1>

    <section class="order-summary">
      <h2 class="section-title">Résumé de la commande</h2>
      <div class="summary-row">
        <span>Items total</span>
        <span>128.78 €</span>
      </div>
      <div class="summary-row">
        <span>Frais de livraison</span>
        <span>5.78 €</span>
      </div>
      <div class="summary-row total">
        <span>Sous-total</span>
        <span>134.56 €</span>
      </div>
    </section>

    <section class="cart-items">
      <div class="cart-item">
        <img src="assets/images/robe.PNG" alt="Robe rose" class="item-img">
        <div class="item-info">
          <p class="item-name">Robe rose</p>
          <p class="item-prices">
            <span class="price">99.99 €</span>
            <span class="old-price">119.99 €</span>
          </p>
          <div class="item-actions">
            <button class="remove-btn">Supprimer</button>
            <span class="quantity">x1</span>
            <span class="subtotal">25.98 €</span>
          </div>
        </div>
      </div>

      <div class="cart-item">
        <img src="assets/images/jupe.PNG" alt="Jupe" class="item-img">
        <div class="item-info">
          <p class="item-name">Jupe</p>
          <p class="item-prices">
            <span class="price">89.99 €</span>
            <span class="old-price">109.99 €</span>
          </p>
          <div class="item-actions">
            <button class="remove-btn">Supprimer</button>
            <span class="quantity">x1</span>
            <span class="subtotal">89.99 €</span>
          </div>
        </div>
      </div>
    </section>

    <p class="help">
      Besoin d'aide ? <a href="#">Consultez notre centre d'aide</a>
    </p>
  </div>

<script src="assets/js/script.js"></script>


</body>
</html>
