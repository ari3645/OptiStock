<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modification du profil - VDRM</title>
  <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>
  <div class="container modif_profil_page">
    <img src="assets/images/logo.PNG" alt="Logo Fashion Chic" class="logo">

    <h1 class="title">Modification du profil</h1>

    <div class="profile-photo">
      <img src="assets/images/photo_placeholder.PNG" alt="Photo de profil" class="profile-icon">
      <button type="button" class="edit-photo-btn">Modifier</button>
    </div>

    <form class="form">
      <label for="fullname">Nom et prénom</label>
      <input type="text" id="fullname" name="fullname" value="">

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password">

      <label for="email">Adresse email</label>
      <input type="email" id="email" name="email">

      <label for="phone">Numéro de téléphone</label>
      <input type="tel" id="phone" name="phone">
    </form>

    <p class="help">
      Besoin d'aide ? <a href="#">Consultez notre centre d'aide</a>
    </p>
  </div>

  <script src="assets/js/script.js"></script>

</body>
</html>
