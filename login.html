<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - VDRM</title>
  <link rel="stylesheet" href="assets/css/style.css">


</head>
<body>
  <div class="container login-page">
    <img src="assets/images/logo.png" alt="Logo Fashion Chic" class="logo">

    <h1 class="title">Bienvenue !</h1>
    <p class="subtitle">Connectez-vous à votre compte</p>

    <form class="form" action="admin-menu.html">
      <input type="text" id="username" name="username" placeholder="Identifiant" required>
      <input type="password" id="password" name="password" placeholder="Mot de passe" required>

      <div class="form-links">
        <a href="#">Mot de passe oublié ?</a>
        <a href="#">Identifiant oublié ?</a>
      </div>

      <button type="submit">Se connecter</button>
    </form>

    <p class="help">
      Pas de compte ? <a href="register.html">S'inscrire</a><br>
      Besoin d'aide ? <a href="#">Consultez notre centre d'aide</a>
    </p>
  </div>

  <script src="assets/js/script.js"></script>

</body>
</html>
